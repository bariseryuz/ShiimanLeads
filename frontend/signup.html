<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Shiiman Leads</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div style="text-align: center; margin-bottom: 2rem;">
        <svg width="48" height="48" viewBox="0 0 32 32" fill="none" style="margin: 0 auto;">
          <rect width="32" height="32" rx="8" fill="url(#gradient1)"/>
          <path d="M8 16L14 10L20 16L26 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 22L14 16L20 22L26 16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="gradient1" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Start your 14-day free trial today</p>

      <div id="alert" class="alert alert-error">
        <span id="alertMessage"></span>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input 
            type="text" 
            id="name" 
            class="form-input" 
            placeholder="John Doe" 
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="you@company.com" 
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="At least 8 characters" 
            required
            minlength="8"
          >
        </div>

        <div class="form-group">
          <button type="submit" class="btn btn-primary" style="width: 100%;" id="submitBtn">
            Create Account
          </button>
        </div>
      </form>

      <div class="auth-link">
        Already have an account? <a href="/login.html">Sign in</a>
      </div>

      <div class="auth-link">
        <a href="/">← Back to home</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const form = document.getElementById('signupForm');
    const alert = document.getElementById('alert');
    const alertMessage = document.getElementById('alertMessage');
    const submitBtn = document.getElementById('submitBtn');

    function showAlert(message, type = 'error') {
      alert.className = `alert alert-${type} show`;
      alertMessage.textContent = message;
      setTimeout(() => {
        alert.classList.remove('show');
      }, 5000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span> Creating account...';

      try {
        const response = await fetch('/api/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok) {
          showAlert('Account created successfully! Redirecting...', 'success');
          
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('token', data.token);
          
          setTimeout(() => {
            window.location.href = '/client-portal.html';
          }, 1500);
        } else {
          showAlert(data.error || 'Failed to create account');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
        }
      } catch (error) {
        // Demo mode
        const demoUser = {
          name: name,
          email: email,
          role: 'client',
          plan: 'Starter'
        };
        
        localStorage.setItem('user', JSON.stringify(demoUser));
        localStorage.setItem('token', 'demo-token-' + Date.now());
        
        showAlert('Account created! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = '/client-portal.html';
        }, 1000);
      }
    });
  </script>
</body>
</html>
