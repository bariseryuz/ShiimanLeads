[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "python3",
  "gcc",
  "gnumake",
  "glib",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "at-spi2-core",
  "cups",
  "dbus",
  "libdrm",
  "libxkbcommon",
  "gtk3",
  "pango",
  "cairo",
  "alsa-lib",
  "expat",
  "gdk-pixbuf",
  "xorg.libX11",
  "xorg.libxcb",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libXScrnSaver",
  "libgbm",
  "mesa"
]

[phases.install]
cmds = ["cd backend && npm install --production=false"]

[phases.build]
cmds = ["cd backend && npm run postinstall || true"]

[start]
cmd = "cd backend && node index.js"

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/nix/store/*/bin/chromium"