<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Construction Leads Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Construction Leads</h1>
    <div class="filters">
      <input id="search" type="text" placeholder="Search text..." />
      <select id="sourceFilter"><option value="">All Sources</option></select>
      <select id="daysFilter">
        <option value="">All Dates</option>
        <option value="1">Last 1 day</option>
        <option value="7">Last 7 days</option>
        <option value="30" selected>Last 30 days</option>
      </select>
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>
  <main>
    <table id="leadsTable">
      <thead>
        <tr>
          <th>Permit #</th>
          <th>Address</th>
          <th>Value</th>
          <th>Description</th>
          <th>Source</th>
          <th>Date Added</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div id="status"></div>
  </main>
  <footer>
    <small>Data auto-scraped. Selling recent construction leads.</small>
  </footer>
  <script src="app.js"></script>
</body>
</html>
