<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Sign Up - Shiiman Leads</title>
  <link rel="icon" type="image/svg+xml" href="icons/user.svg">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <div style="text-align: center; margin-bottom: 2rem;">
        <svg width="160" height="48" viewBox="0 0 400 100" fill="none" style="margin: 0 auto;">
          <defs>
            <linearGradient id="shinyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#000000" stop-opacity="0.6">
                <animate attributeName="stop-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
              </stop>
              <stop offset="50%" stop-color="#ffffff" stop-opacity="1">
                <animate attributeName="offset" values="0;1;0" dur="2s" repeatCount="indefinite" />
              </stop>
              <stop offset="100%" stop-color="#000000" stop-opacity="0.6">
                <animate attributeName="stop-opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
              </stop>
            </linearGradient>
          </defs>
          <text x="200" y="75" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="700" fill="url(#shinyGradient)" text-anchor="middle">Shiiman</text>
        </svg>
      </div>

      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Start your 14-day free trial today</p>

      <div id="alert" class="alert alert-error">
        <span id="alertMessage"></span>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            class="form-input" 
            placeholder="johndoe" 
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="you@company.com" 
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="At least 8 characters" 
            required
            minlength="8"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input 
            type="password" 
            id="confirmPassword" 
            class="form-input" 
            placeholder="Re-enter your password" 
            required
            minlength="8"
          >
        </div>

        <div class="form-group">
          <button type="submit" class="btn btn-primary btn-3d" style="width: 100%;" id="submitBtn">
            <span>Create Account</span>
            <span>Create Account</span>
            <span>Create Account</span>
            <span>Create Account</span>
          </button>
        </div>
      </form>

      <div class="auth-link" style="cursor: pointer; text-align: center;" onclick="window.location.href='/login.html'">
        Already have an account? <a href="/login.html" style="pointer-events: all;">Sign in</a>
      </div>

      <div class="auth-link">
        <a href="/">← Back to home</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const form = document.getElementById('signupForm');
    const alert = document.getElementById('alert');
    const alertMessage = document.getElementById('alertMessage');
    const submitBtn = document.getElementById('submitBtn');

    // Stop button rotation on click or touch
    function stopRotation() {
      submitBtn.classList.add('stopped');
    }
    
    submitBtn.addEventListener('click', stopRotation);
    submitBtn.addEventListener('touchstart', stopRotation);

    function showAlert(message, type = 'error') {
      alert.className = `alert alert-${type} show`;
      alertMessage.textContent = message;
      setTimeout(() => {
        alert.classList.remove('show');
      }, 5000);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading"></span> Creating account...';

      try {
        const response = await fetch('/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',
          body: JSON.stringify({ username, email, password, confirmPassword })
        });

        const data = await response.json();

        if (response.ok) {
          showAlert('Account created successfully! Redirecting...', 'success');
          
          if (data.user) {
            localStorage.setItem('user', JSON.stringify(data.user));
            localStorage.setItem('token', 'authenticated');
          }
          
          setTimeout(() => {
            window.location.href = data.redirect || '/client-portal.html';
          }, 1000);
        } else {
          showAlert(data.error || 'Failed to create account');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
        }
      } catch (error) {
        // Demo mode
        const demoUser = {
          name: name,
          email: email,
          role: 'client',
          plan: 'Starter'
        };
        
        localStorage.setItem('user', JSON.stringify(demoUser));
        localStorage.setItem('token', 'demo-token-' + Date.now());
        
        showAlert('Account created! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = '/client-portal.html';
        }, 1000);
      }
    });
  </script>
</body>
</html>
