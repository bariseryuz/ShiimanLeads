[phases.setup]
nixPkgs = ['nodejs_20', 'chromium']

[phases.install]
cmds = ['cd backend && npm ci --only=production']

[phases.build]
cmds = ['mkdir -p backend/logs backend/output backend/data']

[start]
cmd = 'cd backend && node index.js'

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = 'true'
PUPPETEER_EXECUTABLE_PATH = '/nix/store/*-chromium-*/bin/chromium'
